spring:
  application:
    name: dsc-job
    description: dsc-job分布式定时任务执行器，并提供了丰富的管理接口。
  profiles:
    active: dev

# dcs-job配置
tiger:
  scheduled-task:
    scan:
      task-package: com.hxh.job.task # 定时任务的包路径，用于扫描定时任务
      auto-insert: true # 自动扫描报并入库
      default-cron: "0 0/30 * * * ?" # 默认策略
    pool:
      processor-times: 2 # cpu核数的倍数（整数）
      float-number: 0 # 线程池上下浮动数（整数）
      await-termination-seconds: 30 # 等待终止时间（秒）
      complete-on-shutdown: true # 调度器shutdown后，是否等待当前调度执行完成
      thread-name-prefix: "TaskThread:" # 线程名称前缀
    cluster:
      open: false # 开启集群模式
    log:
      success-open: true # 开启执行成功日志(建议开启)
      fail-open: true # 开启执行失败日志(建议开启)
      save-days: 15 # 日志保存天数
    retry:
      open: true # 是否开启重试策略
      count: 1 # 重试次数
      sleep: 5 # 重试间隔（秒）
  http-util:
    socket-timeout: 60000 # 单位：秒
    connect-timeout: 15000 # 单位：秒
    connection-request-timeout: 60000 # 单位：秒
    max-total: 1500
    default-max-per-route: 300
